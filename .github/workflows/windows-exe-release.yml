name: Build and Release Windows EXE

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows EXE
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run package:win

      - name: Compute release metadata
        id: release_meta
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)

          if ("${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref_name }}"
            $name = "SlideGlint $tag"
            $prerelease = "false"
          }
          else {
            $tag = "auto-${{ github.run_id }}"
            $name = "SlideGlint Auto Build $shortSha"
            $prerelease = "true"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          prerelease: ${{ steps.release_meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release/*.exe

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ github.sha }}
          path: release/*.exe
          if-no-files-found: error
